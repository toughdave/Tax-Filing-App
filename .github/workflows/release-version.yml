name: Release Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Semantic bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  bump-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version and changelog
        id: bump
        run: |
          NEXT_VERSION=$(npm run -s version:bump -- --type ${{ inputs.bump_type }})
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "David"
          git config user.email "toughdave@gmail.com"

      - name: Commit + tag
        run: |
          git add package.json CHANGELOG.md
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.next_version }}"
          git tag "v${{ steps.bump.outputs.next_version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD
          git push origin "v${{ steps.bump.outputs.next_version }}"
